<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FIIT</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-art">
      <div class="login-art-content">
        <div class="art-logo">F</div>
        <h1 class="art-headline">FIIT<br/>Academy</h1>
        <p class="art-tagline">Manage students, track attendance,<br/>grow your academy.</p>
        <div class="art-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="login-form-side">
      <div class="login-box">
        <h2 class="login-title">Welcome back</h2>
        <p class="login-subtitle">Sign in to your admin dashboard</p>

        {% if form.errors %}
          <div class="login-error">Invalid username or password. Please try again.</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" placeholder="Enter username" autofocus required/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" placeholder="Enter password" required/>
          </div>
          <input type="hidden" name="next" value="{{ next }}"/>
          <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
        </form>

        <p class="login-hint">Default: <code>admin</code> / <code>admin123</code></p>
      </div>
    </div>
  </div>
</body>
</html>
